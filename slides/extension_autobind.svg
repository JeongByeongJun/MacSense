<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 440" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">

  <defs>
    <!-- soft drop shadow for realism -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ============== LEFT — macOS NOTIFICATION ============== -->
  <g transform="translate(60, 60)" filter="url(#cardShadow)">
    <!-- card -->
    <rect x="0" y="0" width="680" height="320" rx="20" fill="#F5F5F7" stroke="#D8D8DC" stroke-width="0.5"/>

    <!-- header row -->
    <g transform="translate(28, 28)">
      <!-- app icon -->
      <rect x="0" y="0" width="44" height="44" rx="10" fill="#1A2B5C"/>
      <text x="22" y="32" font-size="24" text-anchor="middle">💡</text>

      <text x="60" y="20" font-size="15" font-weight="600" fill="#1D1D1F">MacSense</text>
      <text x="60" y="38" font-size="13" fill="#86868B">macsense.app</text>

      <text x="620" y="20" font-size="13" fill="#86868B" text-anchor="end">방금</text>
    </g>

    <!-- divider -->
    <line x1="28" y1="100" x2="652" y2="100" stroke="#E5E5EA" stroke-width="1"/>

    <!-- body -->
    <text x="28" y="142" font-size="17" font-weight="600" fill="#1D1D1F">반복 패턴 감지 — 오늘 5회</text>
    <text x="28" y="172" font-size="15" fill="#3C3C43">[카카오톡] 사이드바 › 프로필 셀 클릭</text>
    <text x="28" y="208" font-size="15" font-weight="500" fill="#1D1D1F">이 행동을 단축키로 만들어드릴까요?</text>

    <!-- action buttons -->
    <g transform="translate(28, 240)">
      <rect x="0" y="0" width="140" height="44" rx="10" fill="#FFFFFF" stroke="#D8D8DC" stroke-width="0.8"/>
      <text x="70" y="28" font-size="14" font-weight="500" fill="#1D1D1F" text-anchor="middle">나중에</text>

      <rect x="152" y="0" width="180" height="44" rx="10" fill="#1A2B5C"/>
      <text x="242" y="28" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">✓  단축키 생성</text>
    </g>
  </g>

  <!-- ============== RIGHT — SHORTCUTS.APP ============== -->
  <g transform="translate(960, 60)" filter="url(#cardShadow)">
    <!-- window -->
    <rect x="0" y="0" width="680" height="320" rx="14" fill="#FFFFFF" stroke="#D8D8DC" stroke-width="0.5"/>

    <!-- traffic lights -->
    <g transform="translate(18, 18)">
      <circle cx="0"  cy="0" r="6.5" fill="#FF5F57"/>
      <circle cx="18" cy="0" r="6.5" fill="#FEBC2E"/>
      <circle cx="36" cy="0" r="6.5" fill="#28C840"/>
    </g>

    <!-- title bar -->
    <text x="340" y="22" font-size="13" font-weight="600" fill="#1D1D1F" text-anchor="middle">단축어</text>
    <line x1="0" y1="44" x2="680" y2="44" stroke="#E5E5EA" stroke-width="1"/>

    <!-- sidebar tag -->
    <text x="28" y="78" font-size="12" font-weight="600" letter-spacing="1.5" fill="#86868B">MACSENSE 자동 생성</text>

    <!-- entry row -->
    <g transform="translate(20, 96)">
      <rect x="0" y="0" width="640" height="80" rx="12" fill="#F5F5F7" stroke="#1A2B5C" stroke-width="1"/>

      <!-- icon tile -->
      <rect x="14" y="14" width="52" height="52" rx="11" fill="#1A2B5C"/>
      <text x="40" y="50" font-size="26" text-anchor="middle">💬</text>

      <text x="82" y="36" font-size="16" font-weight="600" fill="#1D1D1F">카카오톡 프로필 열기</text>
      <text x="82" y="58" font-size="13" fill="#86868B">MacSense · 방금 추가됨</text>

      <!-- keycap group -->
      <g transform="translate(490, 24)">
        <rect x="0"  y="0" width="36" height="32" rx="6" fill="#FFFFFF" stroke="#D8D8DC" stroke-width="0.8"/>
        <text x="18" y="22" font-size="15" font-weight="600" fill="#1D1D1F" text-anchor="middle">⌥</text>
        <rect x="42" y="0" width="36" height="32" rx="6" fill="#FFFFFF" stroke="#D8D8DC" stroke-width="0.8"/>
        <text x="60" y="22" font-size="15" font-weight="600" fill="#1D1D1F" text-anchor="middle">⌘</text>
        <rect x="84" y="0" width="36" height="32" rx="6" fill="#FFFFFF" stroke="#D8D8DC" stroke-width="0.8"/>
        <text x="102" y="22" font-family="'Geist Mono', monospace" font-size="15" font-weight="600" fill="#1D1D1F" text-anchor="middle">P</text>
      </g>
    </g>

    <!-- actions list -->
    <text x="28" y="208" font-size="12" font-weight="600" letter-spacing="1.5" fill="#86868B">동작</text>

    <g transform="translate(28, 226)">
      <circle cx="9" cy="14" r="9" fill="none" stroke="#1A2B5C" stroke-width="1.2"/>
      <text x="9" y="18" font-size="11" font-weight="700" fill="#1A2B5C" text-anchor="middle">1</text>
      <text x="32" y="18" font-size="14" fill="#1D1D1F">카카오톡 활성화</text>

      <circle cx="9" cy="46" r="9" fill="none" stroke="#1A2B5C" stroke-width="1.2"/>
      <text x="9" y="50" font-size="11" font-weight="700" fill="#1A2B5C" text-anchor="middle">2</text>
      <text x="32" y="50" font-size="14" fill="#1D1D1F">사이드바 › 프로필 셀 클릭</text>
    </g>
  </g>

</svg>
