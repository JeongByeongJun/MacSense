<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 500" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <polygon points="0,0 12,6 0,12" fill="#1A2B5C"/>
    </marker>
  </defs>

  <!-- ============== STAGE V2-A — 등록 제안 ============== -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="680" height="340" rx="8" fill="none" stroke="#1A2B5C" stroke-width="2"/>

    <!-- V2 badge — different shape from numbered (rectangular) -->
    <rect x="18" y="18" width="60" height="44" rx="4" fill="#1A2B5C"/>
    <text x="48" y="46" font-family="'Geist Mono', monospace" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">V2</text>

    <text x="92" y="48" font-family="'Geist Mono', monospace" font-size="36" font-weight="700" fill="#1A2B5C">Capture</text>

    <text x="40" y="110" font-size="28" font-weight="600" fill="#1A2B5C">반복 패턴을 단축키로 등록</text>
    <text x="40" y="142" font-size="18" fill="#4A567A">DB에 단축키 없는 반복 행동을 사용자 키에 매핑</text>

    <line x1="40" y1="180" x2="640" y2="180" stroke="#1A2B5C" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- mock notification dialog content -->
    <text x="40" y="216" font-family="'Geist Mono', monospace" font-size="13" font-weight="600" letter-spacing="3" fill="#4A567A">PROPOSAL</text>

    <text x="40" y="258" font-size="22" font-weight="500" fill="#1A2B5C">💡 "Finder › 어제"를 9번 반복하셨어요</text>

    <!-- key capture field -->
    <rect x="40" y="276" width="280" height="36" rx="4" fill="none" stroke="#1A2B5C" stroke-width="1.4" stroke-dasharray="4 4"/>
    <text x="180" y="300" font-family="'Geist Mono', monospace" font-size="14" font-weight="500" fill="#4A567A" text-anchor="middle">원하는 키 조합을 누르세요</text>

    <text x="336" y="300" font-family="'Geist Mono', monospace" font-size="16" font-weight="600" fill="#1A2B5C">→ ⌘ ⇧ E</text>
  </g>

  <!-- ============== ARROW ============== -->
  <g transform="translate(740, 250)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="#1A2B5C" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="100" y="-16" font-family="'Geist Mono', monospace" font-size="16" font-weight="600" fill="#4A567A" text-anchor="middle">map</text>
  </g>

  <!-- ============== STAGE V2-B — 활성화 ============== -->
  <g transform="translate(980, 80)">
    <rect x="0" y="0" width="680" height="340" rx="8" fill="none" stroke="#1A2B5C" stroke-width="2"/>

    <rect x="18" y="18" width="60" height="44" rx="4" fill="#1A2B5C"/>
    <text x="48" y="46" font-family="'Geist Mono', monospace" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">V2</text>

    <text x="92" y="48" font-family="'Geist Mono', monospace" font-size="36" font-weight="700" fill="#1A2B5C">Replay</text>

    <text x="40" y="110" font-size="28" font-weight="600" fill="#1A2B5C">사용자 단축키 활성화</text>
    <text x="40" y="142" font-size="18" fill="#4A567A">매핑된 키 입력 시 원본 클릭 시퀀스 자동 재생</text>

    <line x1="40" y1="180" x2="640" y2="180" stroke="#1A2B5C" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- after view -->
    <text x="40" y="216" font-family="'Geist Mono', monospace" font-size="13" font-weight="600" letter-spacing="3" fill="#4A567A">AFTER</text>

    <!-- key chip -->
    <rect x="40" y="240" width="170" height="56" rx="6" fill="#1A2B5C"/>
    <text x="125" y="278" font-family="'Geist Mono', monospace" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">⌘ ⇧ E</text>

    <text x="230" y="276" font-family="'Geist Mono', monospace" font-size="22" font-weight="500" fill="#4A567A">→</text>

    <text x="270" y="266" font-size="18" font-weight="600" fill="#1A2B5C">Finder › 어제</text>
    <text x="270" y="290" font-size="14" fill="#4A567A">9회 클릭 = 1회 키스트로크</text>
  </g>

</svg>
