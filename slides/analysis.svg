<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 500" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <polygon points="0,0 12,6 0,12" fill="#1A2B5C"/>
    </marker>
  </defs>

  <!-- ============== STAGE 03 — SQLite ============== -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="680" height="340" rx="8" fill="none" stroke="#1A2B5C" stroke-width="2"/>

    <circle cx="40" cy="40" r="22" fill="#1A2B5C"/>
    <text x="40" y="48" font-family="'Geist Mono', monospace" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">03</text>

    <text x="80" y="48" font-family="'Geist Mono', monospace" font-size="36" font-weight="700" fill="#1A2B5C">SQLite</text>

    <text x="40" y="110" font-size="28" font-weight="600" fill="#1A2B5C">로컬 로그 저장</text>
    <text x="40" y="142" font-size="18" fill="#4A567A">이벤트마다 (시각, 앱, 경로, role) 누적 · 서버 X</text>

    <line x1="40" y1="180" x2="640" y2="180" stroke="#1A2B5C" stroke-width="1" stroke-dasharray="3 4"/>

    <text x="40" y="216" font-family="'Geist Mono', monospace" font-size="13" font-weight="600" letter-spacing="3" fill="#4A567A">OUTPUT</text>
    <text x="40" y="258" font-family="'Geist Mono', monospace" font-size="18" font-weight="500" fill="#1A2B5C">INSERT INTO events ...</text>
    <text x="40" y="296" font-family="'Geist Mono', monospace" font-size="16" font-weight="500" fill="#1A2B5C">~/Library/.../MacSense/events.db</text>
  </g>

  <!-- ============== ARROW ============== -->
  <g transform="translate(740, 250)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="#1A2B5C" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="100" y="-16" font-family="'Geist Mono', monospace" font-size="16" font-weight="600" fill="#4A567A" text-anchor="middle">events</text>
  </g>

  <!-- ============== STAGE 04 — Detector ============== -->
  <g transform="translate(980, 80)">
    <rect x="0" y="0" width="680" height="340" rx="8" fill="none" stroke="#1A2B5C" stroke-width="2"/>

    <circle cx="40" cy="40" r="22" fill="#1A2B5C"/>
    <text x="40" y="48" font-family="'Geist Mono', monospace" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">04</text>

    <text x="80" y="48" font-family="'Geist Mono', monospace" font-size="36" font-weight="700" fill="#1A2B5C">Detector</text>

    <text x="40" y="110" font-size="28" font-weight="600" fill="#1A2B5C">빈도 감지 (N-gram)</text>
    <text x="40" y="142" font-size="18" fill="#4A567A">최근 5분 같은 패턴 ≥ 3회 → 트리거 · 30분 쿨다운</text>

    <line x1="40" y1="180" x2="640" y2="180" stroke="#1A2B5C" stroke-width="1" stroke-dasharray="3 4"/>

    <text x="40" y="216" font-family="'Geist Mono', monospace" font-size="13" font-weight="600" letter-spacing="3" fill="#4A567A">TRIGGER</text>
    <text x="40" y="258" font-size="22" font-weight="500" fill="#1A2B5C">🔥 [Finder] 새로운 폴더 — 3회</text>
    <text x="40" y="296" font-family="'Geist Mono', monospace" font-size="16" font-weight="500" fill="#4A567A">→ 추천 파이프라인으로 전달</text>
  </g>

</svg>
